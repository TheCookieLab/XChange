name: Integration CI Health

on:
  schedule:
    - cron: '30 8 * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  queued-runs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Check scheduled integration workflow health
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/ci/check-integration-health.py --branch main

      - name: Upload integration health classification
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: integration-ci-health
          path: target/it-ci-health
          if-no-files-found: error
